<div class="section">
<h2>في الركوع</h2>
<p>سبحان ربي العظيم (3 مرات)</p>
</div>

<div class="section">
<h2>بعد الرفع من الركوع</h2>

<p>يقول الإمام والمنفرد:</p>
<p><strong>سمع الله لمن حمده</strong></p>

<p>ثم يقول الجميع:</p>
<p><strong>ربنا ولك الحمد</strong></p>

<p>ويجوز:</p>
<p>ربنا لك الحمد حمداً كثيراً طيباً مباركاً فيه</p>

<div class="note">
قال النبي ﷺ:  
"رأيت بضعةً وثلاثين ملكًا يبتدرونها أيهم يكتبها أول."  
(رواه البخاري)
</div>
