<h1>الدعاء بين السجدتين</h1>

<div class="section">
<p>يجلس المصلي بعد السجدة الأولى جلسة خفيفة ويقول:</p>
<h2>رب اغفر لي</h2>
<p>ويجوز أن يقول أيضًا:</p>
<p>رب اغفر لي وارحمني واهدني واجبرني وعافني وارزقني وارفعني</p>
</div>

<div class="note">
ملاحظة: يمكن تكرار الدعاء بأي صيغة مأثورة، والجلوس بين السجدتين يكون قليلًا وليس مفرطًا.
</div>
